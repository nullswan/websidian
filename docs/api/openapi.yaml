openapi: 3.1.0
info:
  title: Obsidian Web Compatibility API
  version: 0.1.0
  description: >
    Initial API scaffold for a web-native Obsidian-compatible platform.
servers:
  - url: http://localhost:3000
paths:
  /api/auth/session:
    get:
      summary: Get current session
      responses:
        "200":
          description: Session payload
  /api/vaults:
    get:
      summary: List vaults available to the current user
      responses:
        "200":
          description: Vault list
  /api/vaults/{vaultId}/tree:
    get:
      summary: Get vault file tree
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: File tree
  /api/vaults/{vaultId}/files/{path}:
    get:
      summary: Read a file
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: File payload
    put:
      summary: Write a file
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                version:
                  type: string
      responses:
        "200":
          description: Updated file payload
  /api/vaults/{vaultId}/search:
    get:
      summary: Search within a vault
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
  /api/vaults/{vaultId}/links/backlinks:
    get:
      summary: Get backlinks for a file
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backlink results
  /api/vaults/{vaultId}/commands:
    get:
      summary: List available commands
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Command list
components:
  parameters:
    VaultId:
      in: path
      name: vaultId
      required: true
      schema:
        type: string
    FilePath:
      in: path
      name: path
      required: true
      schema:
        type: string
